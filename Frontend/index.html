<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Transcription</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- เพิ่มระบบรถเข็น -->
    <div class="cart-container">
        <div class="cart-icon" onclick="toggleCart()">🛒 <span id="cartCount">0</span></div>
        <div class="cart-summary" id="cartSummary">
            <h3>สรุปออเดอร์</h3>
            <div class="cart-content" id="cartContent"></div>
            <div class="cart-total">Total: $<span id="cartTotal">0.00</span></div>
            <button onclick="checkout()">Checkout</button>
        </div>
    </div>

    <div class="container">
        <h1>Record or Upload Audio File for Transcription</h1>
        
        <!-- ฟอร์มสำหรับอัปโหลดไฟล์ -->
        <form id="uploadForm" enctype="multipart/form-data">
            <label for="languageSelect">Select Language:</label>
            <select id="languageSelect" name="language">
                <option value="en">English</option>
                <option value="th">Thai</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
            </select>
            <br><br>
            <input type="file" name="file" id="fileInput" accept="audio/*">
            <label for="fileInput">Select File</label>
            <span id="fileName"></span>
            <button type="submit">Upload Audio File</button>
        </form>

        <!-- ปุ่มสำหรับบันทึกเสียง -->
        <button id="recordButton">Record Audio</button>
        <button id="stopButton" disabled>Stop Recording</button>
        <button id="uploadButton" disabled>Upload Recorded Audio</button>
        <audio id="audioPlayer" controls></audio>

        <!-- แสดงผลการถอดเสียงและเมนู -->
        <h2>Transcribed Text:</h2>
        <pre id="transcribedText"></pre>
        
        <h2>Detected Menu:</h2>
        <p id="menuName"></p>
        <img id="menuImage" src="" style="display: none; max-width: 300px;" alt="Menu Image">
        
        <!-- ปุ่มเพิ่มในรถเข็น -->
        <button id="addToCart" style="display: none;" onclick="addToCart()">เพิ่มในรถเข็น</button>
    </div>

    <script>
        // ระบบรถเข็น
        let cartItems = [];
        let currentMenu = null;

        function updateCartDisplay() {
            document.getElementById('cartCount').textContent = cartItems.length;
            
            let total = 0;
            const cartContent = document.getElementById('cartContent');
            cartContent.innerHTML = cartItems.map((item, index) => {
                total += item.price;
                return `<div>${index+1}. ${item.name} - $${item.price.toFixed(2)}</div>`;
            }).join('');
            
            document.getElementById('cartTotal').textContent = total.toFixed(2);
        }

        function toggleCart() {
            const cartSummary = document.getElementById('cartSummary');
            cartSummary.style.display = cartSummary.style.display === 'block' ? 'none' : 'block';
        }

        function addToCart() {
            if (!currentMenu) return;
            
            cartItems.push({
                name: currentMenu,
                price: 10.00
            });
            
            updateCartDisplay();
            alert('เพิ่มในรถเข็นเรียบร้อย!');
        }

        function checkout() {
            alert(`การชำระเงินทั้งหมด: $${document.getElementById('cartTotal').textContent}`);
            cartItems = [];
            updateCartDisplay();
        }

        // ระบบเดิม
        async function uploadFile(file, language) {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("language", language);

            document.getElementById("transcribedText").textContent = "Uploading...";

            const response = await fetch("http://127.0.0.1:5000/upload", { 
                method: "POST", 
                body: formData 
            });

            const data = await response.json();
            if (data.text) {
                document.getElementById("transcribedText").textContent = data.text;
                
                if (data.menu) {
                    document.getElementById("menuName").textContent = "Menu: " + data.menu;
                    document.getElementById("menuImage").src = `http://127.0.0.1:5000/image/${data.menu}`;
                    document.getElementById("menuImage").style.display = "block";
                    document.getElementById("addToCart").style.display = "block";
                    currentMenu = data.menu;
                } else {
                    document.getElementById("menuName").textContent = "No matching menu found.";
                    document.getElementById("menuImage").style.display = "none";
                    document.getElementById("addToCart").style.display = "none";
                    currentMenu = null;
                }
            } else {
                document.getElementById("transcribedText").textContent = "Error: " + data.error;
            }
        }

        // ส่วน Event Listeners เดิมทั้งหมดคงไว้ตามเดิม...
        // [ใส่ส่วน Event Listeners เดิมทั้งหมดตรงนี้โดยไม่แก้ไข]
    </script>
</body>
</html>
